<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blueprint Inventory</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-left">
                <h1>Blueprint Inventory</h1>
            </div>
            <div class="header-right">
                <div class="user-info">
                    <span id="usernameDisplay">Loading...</span>
                    <span class="user-badge" id="userRole">User</span>
                </div>
                <button class="btn btn-secondary" id="adminBtn" style="display: none;">Admin Panel</button>
                <button class="btn btn-danger" id="logoutBtn">Logout</button>
            </div>
        </header>
        
        <main class="main-content">
            <!-- Left Panel: Blueprints Catalog -->
            <div class="panel panel-left">
                <div class="panel-header">
                    <div>
                        <h2 class="panel-title">Blueprint Catalog</h2>
                        <p class="panel-subtitle" id="blueprintCount">Loading...</p>
                    </div>
                </div>
                
                <!-- Filters -->
                <div class="filters">
                    <div class="filter-row">
                        <div class="filter-group" style="flex: 1;">
                            <label for="searchFilter">Search Blueprints</label>
                            <input type="text" id="searchFilter" placeholder="Type blueprint name...">
                        </div>
                        <div class="filter-actions">
                            <button class="btn btn-secondary" id="clearFilters">Clear</button>
                            <button class="btn btn-primary" id="applyFilters">Search</button>
                        </div>
                    </div>
                </div>
                
                <!-- Blueprints Grid -->
                <div id="blueprintsGrid" class="blueprint-grid">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Loading blueprints...</p>
                    </div>
                </div>
            </div>
            
            <!-- Right Panel: Inventory -->
            <div class="panel panel-right">
                <div class="panel-header">
                    <div>
                        <h2 class="panel-title">My Inventory</h2>
                        <p class="panel-subtitle" id="inventoryStats">Loading...</p>
                    </div>
                    <div class="panel-actions">
                        <button class="btn btn-secondary" id="exportInventory">Export</button>
                        <button class="btn btn-primary" id="showAllInventory">Show All</button>
                    </div>
                </div>
                
                <!-- Inventory List -->
                <div id="inventoryList" class="inventory-list">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Loading inventory...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Show All Modal -->
    <div id="showAllModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>All Blueprints in Inventory</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div id="showAllGrid" class="show-all-grid">
                    <!-- Blueprint images will be inserted here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
