# Blueprint Inventory with nginx + Let's Encrypt
# General template - edit variables below

version: '3.8'
services:
  # Blueprint Inventory Application
  app:
    # Pre-built multi-architecture image from GitHub
    image: ghcr.io/dtorrero/bpsarc_simple:latest
    container_name: bpsarc-app
    
    # Internal port only - nginx handles external traffic
    expose:
      - "3000"
    
    # Persistent data storage
    volumes:
      - ./data:/app/data
    
    # === EDIT THESE VARIABLES ===
    environment:
      - NODE_ENV=production
      # Generate with: openssl rand -hex 32
      - JWT_SECRET=your-secure-jwt-secret-change-this
      - PORT=3000
    # ==============================
    
    restart: unless-stopped
    networks:
      - bpsarc-network

  # nginx Reverse Proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: bpsarc-nginx
    
    # External ports - must be open for Let's Encrypt
    ports:
      - "80:80"    # HTTP for ACME challenge
      - "443:443"  # HTTPS
    
    # nginx configuration and SSL certificates
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro           # SSL certificates
      - ./certbot/www:/var/www/certbot:ro # ACME challenge files
      - ./certbot/conf:/etc/letsencrypt   # Let's Encrypt config
    
    depends_on:
      - app
    
    restart: unless-stopped
    networks:
      - bpsarc-network

  # certbot for Let's Encrypt certificates
  certbot:
    image: certbot/certbot
    container_name: bpsarc-certbot
    
    # SSL certificates storage
    volumes:
      - ./certbot/www:/var/www/certbot:rw  # ACME challenge
      - ./certbot/conf:/etc/letsencrypt:rw # Certificate storage
    
    # === EDIT THESE VARIABLES ===
    # Command to get certificates (run once initially)
    # Uncomment and run: docker-compose run --rm certbot
    command: >
      certonly
      --webroot
      --webroot-path=/var/www/certbot
      --email your-email@example.com  # ← Change this
      --agree-tos
      --no-eff-email
      --force-renewal
      -d your-domain.com              # ← Change this
    # ==============================
    
    # For auto-renewal (uncomment to enable)
    # entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    
    restart: "no"  # Only run when needed
    networks:
      - bpsarc-network

# Shared volumes
volumes:
  # SSL certificates are stored in ./certbot/conf and ./ssl

# Internal network
networks:
  bpsarc-network:
    driver: bridge