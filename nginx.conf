# nginx configuration template for Blueprint Inventory
# Edit domain and SSL paths

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    
    # ========== SECURITY: Rate Limiting ==========
    # Limit requests per IP to 10 per second
    limit_req_zone $binary_remote_addr zone=web:10m rate=10r/s;
    
    # Limit requests to login endpoint more aggressively
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    
    # ========== SECURITY: Request Size Limits ==========
    client_max_body_size 1m;
    client_body_buffer_size 128k;
    
    # ========== SECURITY: Timeouts ==========
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    
    # Upstream - the Node.js app
    upstream app_server {
        server app:3000;
        keepalive 32;
    }
    
    # HTTP server - redirects to HTTPS
    server {
        listen 80;
        server_name your-domain.com;  # ← Change this
        
        # ========== SECURITY: Block malicious requests ==========
        
        # Block path traversal attempts (single and double encoded)
        if ($request_uri ~* "\.\./|\.\.\\|\.\.%|%2e%2e|%%32%65%%32%65|%%32%65%%32%65/|\.%00") {
            return 403;
        }
        
        # Block common attack patterns (including Docker Registry API probes)
        if ($request_uri ~* "/cgi-bin/|/bin/|/etc/|/proc/|/dev/|/var/|/usr/|/tmp/|/boot/|/root/|/v2/") {
            return 403;
        }
        
        # Block PHP-related attacks (we don't use PHP)
        if ($request_uri ~* "\.php|allow_url_include|auto_prepend_file|php://") {
            return 403;
        }
        
        # Block SQL injection patterns
        if ($query_string ~* "union.*select|select.*from|insert.*into|drop.*table|delete.*from|update.*set|--|;") {
            return 403;
        }
        
        # Block suspicious User-Agents (scanners, bots, registry probes)
        if ($http_user_agent ~* (libredtail|nikto|sqlmap|nmap|masscan|acunetix|nessus|openvas|wpscan|whatweb|dirbuster|gobuster|hydra|medusa|aircrack|go-http-client)) {
            return 403;
        }
        
        # Block requests with no User-Agent (common for scanners)
        if ($http_user_agent = "") {
            return 403;
        }
        
        # ACME challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        # Redirect everything else to HTTPS
        location / {
            return 301 https://$server_name$request_uri;
        }
    }
    
    # HTTPS server
    server {
        listen 443 ssl;
        http2 on;
        server_name your-domain.com;  # ← Change this
        
        # SSL certificates from Let's Encrypt
        # Update paths after running certbot
        ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;  # ← Change this
        ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;  # ← Change this
        
        # SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        
        # ========== SECURITY HEADERS ==========
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
        
        # ========== SECURITY: Block malicious requests ==========
        
        # Block path traversal attempts (single and double encoded)
        if ($request_uri ~* "\.\./|\.\.\\|\.\.%|%2e%2e|%%32%65%%32%65|%%32%65%%32%65/|\.%00") {
            return 403;
        }
        
        # Block common attack patterns (including Docker Registry API probes)
        if ($request_uri ~* "/cgi-bin/|/bin/|/etc/|/proc/|/dev/|/var/|/usr/|/tmp/|/boot/|/root/|/v2/") {
            return 403;
        }
        
        # Block PHP-related attacks (we don't use PHP)
        if ($request_uri ~* "\.php|allow_url_include|auto_prepend_file|php://") {
            return 403;
        }
        
        # Block SQL injection patterns
        if ($query_string ~* "union.*select|select.*from|insert.*into|drop.*table|delete.*from|update.*set|--|;") {
            return 403;
        }
        
        # Block suspicious User-Agents (scanners, bots, registry probes)
        if ($http_user_agent ~* (libredtail|nikto|sqlmap|nmap|masscan|acunetix|nessus|openvas|wpscan|whatweb|dirbuster|gobuster|hydra|medusa|aircrack|go-http-client)) {
            return 403;
        }
        
        # Block requests with no User-Agent (common for scanners)
        if ($http_user_agent = "") {
            return 403;
        }
        
        # ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        # ========== SECURITY: API Rate Limiting ==========
        location /api/auth {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://app_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Proxy to app
        location / {
            limit_req zone=web burst=20 nodelay;
            proxy_pass http://app_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
        
        # Health check endpoint
        location /api/health {
            proxy_pass http://app_server;
            access_log off;
        }
    }
}
